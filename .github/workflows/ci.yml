name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: test
      DATABASE_URL: file:../db/ci.db
      TARGET_REGION: mo
      LOG_LEVEL: warn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Framework detector tests
        run: bun run test:framework

      - name: Validator tests
        run: bun run test:validator

      - name: Discovery tests
        run: bun run test:discovery

      - name: Parser tests
        run: bun run test:parser

      - name: Scrape runner tests
        run: bun run test:scrape-runner

      - name: Build
        run: bun run build
